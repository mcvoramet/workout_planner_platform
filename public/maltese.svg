<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle (soft pink) -->
  <circle cx="32" cy="32" r="32" fill="#FBEAF0"/>

  <!-- Left ear (floppy) -->
  <ellipse cx="14" cy="30" rx="9" ry="14" fill="#fff" stroke="#d8d4d0" stroke-width="1" transform="rotate(-18 14 30)"/>
  <!-- Right ear (floppy) -->
  <ellipse cx="50" cy="30" rx="9" ry="14" fill="#fff" stroke="#d8d4d0" stroke-width="1" transform="rotate(18 50 30)"/>

  <!-- Top tuft of fur -->
  <circle cx="26" cy="16" r="5" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>
  <circle cx="32" cy="13" r="5" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>
  <circle cx="38" cy="16" r="5" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>

  <!-- Face (fluffy white) -->
  <ellipse cx="32" cy="36" rx="18" ry="18" fill="#fff" stroke="#d8d4d0" stroke-width="1"/>

  <!-- Cheek tufts -->
  <circle cx="17" cy="44" r="6" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>
  <circle cx="47" cy="44" r="6" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>
  <circle cx="22" cy="50" r="5" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>
  <circle cx="42" cy="50" r="5" fill="#fff" stroke="#d8d4d0" stroke-width="0.8"/>

  <!-- Eyes -->
  <ellipse cx="25" cy="33" rx="2.4" ry="2.8" fill="#1a1a18"/>
  <ellipse cx="39" cy="33" rx="2.4" ry="2.8" fill="#1a1a18"/>
  <!-- Eye shines -->
  <circle cx="26" cy="32" r="0.8" fill="#fff"/>
  <circle cx="40" cy="32" r="0.8" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="32" cy="41" rx="2.6" ry="2" fill="#1a1a18"/>

  <!-- Mouth -->
  <path d="M32 43 Q32 46 29 46" stroke="#1a1a18" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M32 43 Q32 46 35 46" stroke="#1a1a18" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Tongue -->
  <ellipse cx="32" cy="48" rx="2" ry="1.5" fill="#F4A6BC"/>

  <!-- Pink bow on top -->
  <path d="M30 8 L34 8 L36 11 L34 14 L30 14 L28 11 Z" fill="#D4537E"/>
  <circle cx="32" cy="11" r="1.2" fill="#FBEAF0"/>
</svg>
